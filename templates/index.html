{% extends "base.html" %}
{% block title %}Work Logger{% endblock %}

{% block content %}
<input type="hidden" id="current-date" value="{{ today }}">

<!-- Topbar (desktop only) -->
<div class="topbar">
  <div class="date-nav">
    <button class="date-nav-btn" id="prev-day" title="Previous day">&#8592;</button>
    <div class="date-display-wrap" onclick="openDatePicker(event)">
      <span class="date-display-text"></span>
      <span class="today-badge-el" style="display:none;">TODAY</span>
    </div>
    <input type="date" id="date-picker" value="{{ today }}">
    <button class="date-nav-btn" id="next-day" title="Next day">&#8594;</button>
    <button class="today-jump-pill" id="today-jump-pill" style="display:none;" title="Jump to today">Today</button>
  </div>

  <div class="topbar-stats">
    <div class="stat-pill">
      <span class="stat-pill-dot dot-t"></span>
      <span class="stat-pill-label">Tasks</span>
      <span class="stat-pill-val stat-tasks-val">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-pill-dot dot-l"></span>
      <span class="stat-pill-label">Learnings</span>
      <span class="stat-pill-val stat-learnings-val">—</span>
    </div>
  </div>
</div>

<!-- Page body -->
<div class="page-body">

  <!-- Mobile date bar (hidden on desktop) -->
  <div class="mobile-date-bar">
    <div class="mobile-date-nav">
      <button class="date-nav-btn" id="mob-prev-day">&#8592;</button>
      <div class="date-display-wrap" onclick="openDatePicker(event)" style="padding:5px 12px;">
        <span id="date-display"></span>
        <span class="today-badge" id="today-badge" style="display:none;">TODAY</span>
      </div>
      <button class="date-nav-btn" id="mob-next-day">&#8594;</button>
    </div>
    <div style="display:flex;gap:8px;">
      <div class="stat-pill" style="padding:5px 10px;">
        <span class="stat-pill-dot dot-t"></span>
        <span class="stat-pill-val" id="stat-tasks">—</span>
      </div>
      <div class="stat-pill" style="padding:5px 10px;">
        <span class="stat-pill-dot dot-l"></span>
        <span class="stat-pill-val" id="stat-learnings">—</span>
      </div>
    </div>
  </div>

  <!-- Tasks + Learnings side by side -->
  <div class="page-columns">

  <!-- Tasks -->
  <div class="section-panel">
    <div class="section-header">
      <div class="section-title">
        <span class="section-dot dot-tasks"></span>
        Tasks
      </div>
      <button class="add-btn" onclick="openTaskModal()">More options</button>
    </div>
    <div class="quick-add-row">
      <input type="text" class="quick-add-input" id="quick-add-input" placeholder="Add a task and press Enter…">
      <button class="quick-add-btn" onclick="quickAddTask()" title="Add task">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- Learnings -->
  <div class="section-panel">
    <div class="section-header">
      <div class="section-title">
        <span class="section-dot dot-learnings"></span>
        Learnings
      </div>
      <button class="add-btn learning" onclick="openLearningModal()">+ Add Learning</button>
    </div>
    <div id="learnings-list"></div>
  </div>

  </div><!-- end .page-columns -->

</div>

<!-- Custom date picker popup -->
<div id="date-picker-popup" class="dp-popup" style="display:none;">
  <div class="dp-header">
    <button class="dp-nav-btn" id="dp-prev-month">&#8592;</button>
    <span class="dp-month-label" id="dp-month-label"></span>
    <button class="dp-nav-btn" id="dp-next-month">&#8594;</button>
  </div>
  <div class="dp-weekdays">
    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
  </div>
  <div class="dp-grid" id="dp-grid"></div>
</div>

{% endblock %}

{% block modals %}
<!-- Task Modal -->
<div class="modal fade" id="task-modal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="task-modal-title">New Task</h5>
        <button type="button" class="refactor-btn" id="refactor-btn" onclick="refactorTask()" title="Refactor with AI" style="display:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M17.8 6.2 19 5M3 21l9-9M12.2 6.2 11 5"/>
            <path d="M2 9l4.5 4.5"/>
            <path d="M10 3 8.5 4.5"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-id">
        <div class="mb-3">
          <label class="form-label">Title <span style="color:var(--danger)">*</span></label>
          <input type="text" class="form-control" id="task-title" placeholder="What did you work on?">
        </div>
        <div class="mb-3">
          <div class="note-label-row">
            <label class="form-label" style="margin:0;">Note</label>
            <div class="note-toolbar">
              <button type="button" class="note-fmt-btn" onclick="fmtNote('bold')" title="Bold"><strong>B</strong></button>
              <button type="button" class="note-fmt-btn" onclick="fmtNote('italic')" title="Italic"><em>I</em></button>
            </div>
          </div>
          <textarea class="form-control" id="task-note" rows="7" placeholder="Details, links, context…"></textarea>
          <div class="note-preview" id="note-preview" style="display:none;"></div>
        </div>
        <div class="mb-1">
          <label class="form-label">Status</label>
          <div class="status-toggle-group">
            <button type="button" class="status-btn active" id="status-done" onclick="setTaskStatus('done')">Done</button>
            <button type="button" class="status-btn" id="status-inprogress" onclick="setTaskStatus('in_progress')">In Progress</button>
          </div>
        </div>
        <input type="hidden" id="task-status" value="done">
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-primary-custom" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>
</div>

<!-- Learning Modal -->
<div class="modal fade" id="learning-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="learning-modal-title">New Learning</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="learning-id">
        <div class="mb-3">
          <label class="form-label">What did you learn? <span style="color:var(--danger)">*</span></label>
          <textarea class="form-control" id="learning-content" rows="4" placeholder="Describe what you learned…"></textarea>
        </div>
        <div class="mb-1">
          <label class="form-label">Tags <span style="color:var(--text-muted);font-weight:400;">(comma-separated)</span></label>
          <input type="text" class="form-control" id="learning-tags" placeholder="python, flask, mongodb">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-success-custom" onclick="saveLearning()">Save Learning</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
