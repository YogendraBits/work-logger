<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Work Logger</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">📋</div>
      <div class="login-title">Work Logger</div>
      <div class="login-sub">Sign in to your workspace</div>

      {% if error %}
        <div class="login-alert">⚠️ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username"
            autofocus autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-password-wrap">
            <input type="password" class="form-control" id="login-pw"
              name="password" autocomplete="current-password" required>
            <button class="toggle-pw" type="button" onclick="toggleLoginPw()">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary-custom w-100" style="padding:11px; border-radius:12px;">
          Sign In →
        </button>
      </form>

      <div class="login-divider"><span>secured by MongoDB Atlas</span></div>
      <p style="text-align:center; font-size:12px; color:var(--text-muted);">
        Forgot your password? Ask your admin to reset it.
      </p>
    </div>
  </div>

  <script>
    function toggleLoginPw() {
      const el = document.getElementById('login-pw');
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
