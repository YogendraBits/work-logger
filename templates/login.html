<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Work Logger</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

  <!-- Floating water orbs -->
  <div class="water-orb orb-1"></div>
  <div class="water-orb orb-2"></div>
  <div class="water-orb orb-3"></div>
  <div class="water-orb orb-4"></div>

  <div class="login-page">
    <div class="login-card">

      <!-- Drop icon -->
      <div class="login-drop-wrap">
        <div class="login-drop">
          <svg viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2 C20 2 4 20 4 31 C4 40.9 11.2 48 20 48 C28.8 48 36 40.9 36 31 C36 20 20 2 20 2Z"
              fill="url(#dropGrad)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
            <!-- specular highlight -->
            <ellipse cx="14" cy="22" rx="4" ry="6" fill="rgba(255,255,255,0.35)" transform="rotate(-20 14 22)"/>
            <defs>
              <linearGradient id="dropGrad" x1="10" y1="5" x2="32" y2="48" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#a8d4f5"/>
                <stop offset="100%" stop-color="#4a8fd4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="login-drop-ripple"></div>
      </div>

      <div class="login-title">Work Logger</div>
      <div class="login-sub">Sign in to your workspace</div>

      {% if error %}
        <div class="login-alert">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="on">
        <div class="login-field">
          <label class="login-label">Username</label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" class="login-input" name="username"
              autofocus autocomplete="username" required placeholder="your username">
          </div>
        </div>

        <div class="login-field">
          <label class="login-label">Password</label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" class="login-input" id="login-pw"
              name="password" autocomplete="current-password" required placeholder="••••••••">
            <button class="login-eye-btn" type="button" onclick="toggleLoginPw()">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="login-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        secured by MongoDB Atlas
      </div>

    </div>
  </div>

  <script>
    function toggleLoginPw() {
      const el = document.getElementById('login-pw');
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
