name: Deploy to BTP Cloud Foundry

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CF CLI v8
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            -o cf8.tar.gz
          tar -xzf cf8.tar.gz
          sudo mv cf8 /usr/local/bin/cf8
          cf8 --version

      - name: CF login and target
        run: |
          cf8 api "${{ secrets.CF_API_ENDPOINT }}"
          cf8 auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf8 target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Set environment variables
        run: |
          cf8 set-env work-logger MONGO_URI "${{ secrets.MONGO_URI }}"
          cf8 set-env work-logger SECRET_KEY "${{ secrets.SECRET_KEY }}"

      - name: Push app
        run: cf8 push work-logger

      - name: Verify deployment
        run: cf8 app work-logger
